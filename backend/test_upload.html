<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 解析测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .upload-section {
            padding: 40px;
            text-align: center;
            border-bottom: 2px solid #f0f0f0;
        }

        .upload-box {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            background: #f8f9ff;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-box:hover {
            border-color: #764ba2;
            background: #f0f1ff;
        }

        .upload-box.dragging {
            border-color: #764ba2;
            background: #e8e9ff;
            transform: scale(1.02);
        }

        input[type="file"] {
            display: none;
        }

        .file-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #666;
            font-size: 14px;
        }

        .selected-file {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 10px;
            color: #2e7d32;
            font-weight: 500;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            font-weight: 600;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            margin-top: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-section {
            padding: 40px;
            display: none;
        }

        .result-section.active {
            display: block;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .result-header h2 {
            color: #333;
            font-size: 24px;
        }

        .copy-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .json-display {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 25px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
        }

        .json-display pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 4px solid #c62828;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            opacity: 0.9;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 PDF 解析测试工具</h1>
            <p>测试 FastAPI 后端的 PDF 上传和解析功能</p>
        </div>

        <div class="upload-section">
            <div class="upload-box" id="uploadBox" onclick="document.getElementById('fileInput').click()">
                <div class="file-icon">📁</div>
                <div class="upload-text">点击或拖拽 PDF 文件到此处</div>
                <div class="upload-hint">支持雅思真题 PDF 文件</div>
            </div>
            <input type="file" id="fileInput" accept=".pdf">
            <div id="selectedFile" class="selected-file" style="display: none;"></div>
            <button class="button" id="uploadBtn" disabled>开始解析</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div style="text-align: center; color: #667eea; font-weight: 500;">解析中，请稍候...</div>
            </div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-header">
                <h2>解析结果</h2>
                <button class="copy-btn" onclick="copyJSON()">📋 复制 JSON</button>
            </div>

            <div class="stats" id="stats"></div>

            <div class="json-display">
                <pre id="jsonResult"></pre>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadBox = document.getElementById('uploadBox');
        const selectedFileDiv = document.getElementById('selectedFile');
        const uploadBtn = document.getElementById('uploadBtn');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('resultSection');
        const jsonResult = document.getElementById('jsonResult');
        const stats = document.getElementById('stats');

        let selectedFile = null;

        // FastAPI 后端地址
        const API_URL = 'http://localhost:8000/parse';

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files[0]);
        });

        // 拖拽上传
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('dragging');
        });

        uploadBox.addEventListener('dragleave', () => {
            uploadBox.classList.remove('dragging');
        });

        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('dragging');
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect(file);
            }
        });

        function handleFileSelect(file) {
            if (!file) return;

            if (file.type !== 'application/pdf') {
                alert('请选择 PDF 文件！');
                return;
            }

            selectedFile = file;
            selectedFileDiv.textContent = `已选择: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            selectedFileDiv.style.display = 'block';
            uploadBtn.disabled = false;
        }

        // 上传并解析
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            uploadBtn.disabled = true;
            loading.classList.add('active');
            resultSection.classList.remove('active');

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                displayResult(data);
            } catch (error) {
                console.error('Error:', error);
                displayError(error.message);
            } finally {
                loading.classList.remove('active');
                uploadBtn.disabled = false;
            }
        });

        function displayResult(data) {
            // 显示统计信息
            stats.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${data.total_pages || 0}</div>
                    <div class="stat-label">总页数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${data.article ? (data.article.length / 100).toFixed(0) : 0}</div>
                    <div class="stat-label">文章字数 (百)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${Object.keys(data.answers || {}).length}</div>
                    <div class="stat-label">题目数量</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${data.pages ? data.pages.filter(p => p.is_scan).length : 0}</div>
                    <div class="stat-label">扫描页数</div>
                </div>
            `;

            // 显示 JSON
            jsonResult.textContent = JSON.stringify(data, null, 2);
            resultSection.classList.add('active');
        }

        function displayError(message) {
            resultSection.innerHTML = `
                <div class="error">
                    <strong>❌ 解析失败</strong><br>
                    ${message}
                </div>
            `;
            resultSection.classList.add('active');
        }

        function copyJSON() {
            const text = jsonResult.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                const originalText = btn.textContent;
                btn.textContent = '✅ 已复制';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }
    </script>
</body>
</html>
